name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build, kubernetes-manifest-check]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Set up Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 --decode > $HOME/.kube/config

      - name: Update deployment images
        run: |
          IMAGE_BACKEND="ghcr.io/${{ github.repository }}/backend:sha-${GITHUB_SHA::7}"
          IMAGE_FRONTEND="ghcr.io/${{ github.repository }}/frontend:sha-${GITHUB_SHA::7}"
          sed -i "s|your-registry/ecommerce-backend:latest|$IMAGE_BACKEND|g" k8s/application.yaml
          sed -i "s|your-registry/ecommerce-frontend:latest|$IMAGE_FRONTEND|g" k8s/application.yaml

      - name: Apply Infrastructure
        run: kubectl apply -f k8s/infrastructure.yaml

      - name: Apply Application
        run: kubectl apply -f k8s/application.yaml

      - name: Rollout Status
        run: |
          kubectl rollout status deployment/ecommerce-backend
          kubectl rollout status deployment/ecommerce-frontend
  kubernetes-manifest-check:
    name: Kubernetes Manifest Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz -o kubeconform.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform

      - name: Validate Kubernetes manifests
        run: |
          kubeconform -strict -summary -ignore-missing-schemas k8s/*.yaml backend/k8s/*.yaml
  database-migration-check:
    name: Database Migration Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ecommerce
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install alembic psycopg2-binary
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Migration Dry-Run
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5433/ecommerce
        run: |
          alembic upgrade head
          alembic check
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
  frontend-ci:
    name: Frontend CI (Lint & Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint Storefront
        working-directory: frontend
        run: npm run lint:storefront

      - name: Lint Admin
        working-directory: frontend
        run: npm run lint:admin

      - name: Build Storefront (Test)
        working-directory: frontend
        run: npm run build:storefront
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

      - name: Build Admin (Test)
        working-directory: frontend
        run: npm run build:admin
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
  backend-test:
    name: Backend Test (Pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ecommerce
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install pytest pytest-asyncio httpx
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Migrations
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:password@localhost:5433/ecommerce
        run: alembic upgrade head
      - name: Run Pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql+psycopg2://postgres:password@localhost:5433/ecommerce
          REDIS_URL: redis://localhost:6379/0
          PYTHONPATH: .
        run: pytest -v
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5433/ecommerce
          REDIS_URL: redis://localhost:6379/0
        run: pytest
  backend-lint:
    name: Backend Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run Ruff Check
        working-directory: backend
        run: ruff check . --exit-zero
        
      - name: Run Ruff Format Check
        working-directory: backend
        run: ruff format --check .
