name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  frontend-ci:
    name: Frontend CI (Lint & Build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Lint Storefront
        working-directory: frontend
        run: npm run lint:storefront

      - name: Lint Admin
        working-directory: frontend
        run: npm run lint:admin

      - name: Build Storefront (Test)
        working-directory: frontend
        run: npm run build:storefront
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

      - name: Build Admin (Test)
        working-directory: frontend
        run: npm run build:admin
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
  backend-test:
    name: Backend Test (Pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: ecommerce
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install pytest pytest-asyncio httpx
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Run Pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5433/ecommerce
          REDIS_URL: redis://localhost:6379/0
        run: pytest
  backend-lint:
    name: Backend Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Run Ruff Check
        working-directory: backend
        run: ruff check .
        
      - name: Run Ruff Format Check
        working-directory: backend
        run: ruff format --check .
