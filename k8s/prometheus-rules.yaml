apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ecommerce-alerts
  namespace: monitoring
  labels:
    release: prometheus
spec:
  groups:
  - name: ecommerce-critical
    rules:
    - alert: HighErrorRate
      expr: |
        (sum(rate(fastapi_requests_total{status=~"5.."}[2m])) / sum(rate(fastapi_requests_total[2m]))) > 0.05
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "API error rate > 5% for 2 minutes"
        description: "HTTP 5xx rate is {{ $value | humanizePercentage }} on all endpoints."

  - name: ecommerce-warning
    rules:
    - alert: HighLatencyP99
      expr: |
        histogram_quantile(0.99, sum(rate(fastapi_request_duration_seconds_bucket{path="/api/v1/products"}[5m])) by (le)) > 2
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "P99 latency of /products > 2s for 5 minutes"
        description: "P99 is {{ $value }}s — check DB indexes or SQLAlchemy queries."

    - alert: RegistrationSpamByIP
      expr: |
        sum by (ip_address) (rate(auth_registration_attempts_total{status="success"}[5m])) > 5
      for: 1m
      labels:
        severity: high
      annotations:
        summary: "IP {{ $labels.ip_address }} registered > 5 accounts in 5 minutes"
        description: "{{ $value }} registrations/min. Automatically flag pending_verification."

    - alert: WebSocketDisconnectSpike
      expr: |
        rate(ws_close_code_attempts_total[1m]) > 50
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "WebSocket close code 1008 spike > 50/min"
        description: "Check for bot WS connection spam."
