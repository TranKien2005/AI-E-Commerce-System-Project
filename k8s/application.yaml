# Backend Secret
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
type: Opaque
stringData:
  SECRET_KEY: "ChangeThisSecretKeyInProduction-Use-Strong-Random-String"
  DATABASE_URL: "postgresql+psycopg2://postgres:postgres@postgres:5432/ecommerce"
  REDIS_URL: "redis://redis:6379/0"
  AI_SEARCH_API_KEY: ""
  AI_SEARCH_MODE: "gemini"
---
# Backend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-backend
  template:
    metadata:
      labels:
        app: ecommerce-backend
    spec:
      containers:
      - name: backend
        image: ai-ecommerce-backend:test
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: REDIS_URL
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: SECRET_KEY
        - name: AI_SEARCH_API_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: AI_SEARCH_API_KEY
        - name: AI_SEARCH_MODE
          valueFrom:
            secretKeyRef:
              name: backend-secret
              key: AI_SEARCH_MODE
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://opentelemetry-collector.monitoring.svc.cluster.local:4317"
        - name: TRACING_ENABLED
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: "ai-ecommerce-backend"
        - name: EMAIL_BACKEND
          value: "smtp"
        - name: SMTP_HOST
          value: "localhost"
        - name: SMTP_PORT
          value: "1025"
        resources:
          limits:
            cpu: "1"
            memory: 512Mi
          requests:
            cpu: "200m"
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
---
# Backend Service
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-backend
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: 8000
  selector:
    app: ecommerce-backend
---
# Frontend Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ecommerce-frontend
  template:
    metadata:
      labels:
        app: ecommerce-frontend
    spec:
      containers:
      - name: frontend
        image: ai-ecommerce-frontend:test
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_BASE_URL
          value: "/api/v1"
        - name: INTERNAL_API_BASE_URL
          value: "http://ecommerce-backend:8000/api/v1"
        resources:
          limits:
            cpu: "500m"
            memory: 256Mi
          requests:
            cpu: "100m"
            memory: 128Mi
---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: ecommerce-frontend
---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ecommerce-ingress
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "false"
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: ecommerce-backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ecommerce-frontend
            port:
              number: 80
