apiVersion: v1
kind: Pod
metadata:
  name: image-loader
spec:
  hostPID: true
  restartPolicy: Never
  containers:
    - name: loader
      image: postgres:16
      command: ["sleep", "3600"]
      securityContext:
        privileged: true
      volumeMounts:
        - name: host
          mountPath: /host
  volumes:
    - name: host
      hostPath:
        path: /
