apiVersion: batch/v1
kind: Job
metadata:
  name: ecommerce-migration
spec:
  template:
    spec:
      containers:
        - name: migration
          image: ai-ecommerce-backend:test
          imagePullPolicy: IfNotPresent
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: DATABASE_URL
      restartPolicy: Never
  backoffLimit: 1
